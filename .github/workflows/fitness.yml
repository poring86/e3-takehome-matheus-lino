name: Fitness Functions

on:
  push:
    branches: ["**"]

jobs:
  fitness:
    runs-on: ubuntu-latest
    env:
      APP_PORT: "3000"
      API_PORT: "3000"
      NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-anon-key"
      DATABASE_URL: "postgres://postgres:password@localhost:5432/postgres"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Architecture boundary tests
        run: npm run architecture:test
      - name: Build Docker image
        run: docker build -t e3-takehome-check:latest .
      - name: Check Docker image size
        run: npx tsx src/fitness/check-docker-image-size.ts
      - name: Start containers
        run: docker compose up -d
      - name: Wait for API
        run: |
          for i in {1..20}; do
            if curl -s "http://localhost:${APP_PORT}/api/notes" > /dev/null; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Lint strict
        run: npx tsx src/fitness/check-lint-strict.ts
      - name: Check file naming convention
        run: npx tsx src/fitness/check-file-naming.ts
      - name: Corrige permissões do workspace
        run: sudo chown -R $USER:$USER .
      - name: Limpa pasta .next
        run: sudo rm -rf .next
      - name: Build frontend
        run: npm run build
      - name: Check frontend bundle size
        run: npx tsx src/fitness/check-bundle-size.ts
      - name: Check test coverage
        run: npx tsx src/fitness/check-test-coverage.ts
