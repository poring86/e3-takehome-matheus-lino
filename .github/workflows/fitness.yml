name: Fitness Functions

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  fitness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Architecture boundary tests
        run: npm run architecture:test
      - name: Build Docker image
        run: docker build -t e3-takehome-check:latest .
      - name: Check Docker image size
        run: npx tsx src/fitness/checkDockerImageSize.ts
      - name: Start containers
        run: docker compose up -d
      - name: Wait for API
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:3001/api/notes > /dev/null; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Check API response time
        run: npx tsx src/fitness/checkApiResponseTime.ts
      - name: Check test coverage
        run: npx tsx src/fitness/checkTestCoverage.ts
